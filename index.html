<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Mitológiai Mindmap</title>
  <script src="https://cdn.jsdelivr.net/npm/3d-force-graph"></script>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #000011; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    
    #layout {
      position: relative;
      height: 100vh;
      width: 100vw;
    }

    /* A gráf kitölti a teljes hátteret */
    #3d-graph { 
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Lebegő jobb oldali panel - "elől" van */
    #sidebar {
      position: absolute;
      right: 0;
      top: 0;
      width: 400px;
      height: 100%;
      background: rgba(10, 10, 25, 0.9);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 215, 0, 0.3);
      display: flex;
      flex-direction: column;
      color: #e0e0e0;
      box-shadow: -10px 0 30px rgba(0,0,0,0.8);
      z-index: 100;
      pointer-events: auto; /* Interaktív marad */
    }

    .sidebar-content {
      padding: 30px;
      flex: 1;
      overflow-y: auto;
    }

    .info-header {
      border-bottom: 2px solid #ffd700;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }

    #info-name {
      margin: 0;
      color: #ffd700;
      font-variant: small-caps;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .info-group-tag {
      display: inline-block;
      background: #00E5FF;
      color: #000;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 12px;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .description-box {
      background: rgba(255, 255, 255, 0.05);
      border-left: 4px solid #ffd700;
      padding: 20px;
      border-radius: 0 8px 8px 0;
      line-height: 1.7;
      font-size: 16px;
      color: #ccc;
    }

    .controls {
      padding: 20px;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid #334;
    }

    label { 
      font-size: 10px; 
      text-transform: uppercase; 
      color: #889; 
      display: block; 
      margin-bottom: 8px; 
    }

    input[type=range] {
      width: 100%;
      cursor: pointer;
      accent-color: #ffd700;
    }

    /* Scrollbar stílus */
    .sidebar-content::-webkit-scrollbar { width: 4px; }
    .sidebar-content::-webkit-scrollbar-thumb { background: #ffd700; }
  </style>
  <style>
    #quote-overlay {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 350px;
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1000;
      transition: all 0.3s ease;
    }

    #quote-content {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #333;
    }

    #q-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ffd700;
    }

    .q-text-wrapper p {
      font-size: 18px;
      font-family: serif;
      margin: 0 0 5px 0;
      line-height: 1.3;
    }

    .q-text-wrapper cite {
      font-weight: bold;
      font-style: normal;
      display: block;
    }

    #toggle-quote {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #999;
    }

    #copy-btn {
      margin-top: 15px;
      width: 100%;
      padding: 8px;
      background: #ffd700;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #copy-btn:hover { background: #e6c200; }

    #open-quote {
      position: absolute;
      left: 20px;
      top: 20px;
      z-index: 1000;
      background: #ffd700;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

  </style>
</head>
<body>

<div id="layout">
  <div id="3d-graph"></div>

  <aside id="sidebar">
    <div class="sidebar-content">
      <div id="welcome-view">
        <h2 style="color: #ffd700;">Χαῖρε!</h2>
        <p>Válassz egy entitást a hálózatban a részletes adatok megtekintéséhez.</p>
      </div>

      <div id="node-view" style="display: none;">
        <div class="info-header">
          <h1 id="info-name"></h1>
          <span id="info-group" class="info-group-tag"></span>
        </div>
        <div class="description-box">
          <p id="info-description"></p>
        </div>
      </div>
    </div>

    <div class="controls">
      <label for="time-slider">Kronosz Idővonala (Részecske sebesség)</label>
      <input type="range" id="time-slider" min="0" max="0.05" step="0.001" value="0.006">
    </div>
  </aside>
</div>
<script src="js/api.js"></script>
<script src="js/nodeData.js"></script>
<script src="js/colorGer.js"></script>
<script src="js/loadGraph.js"></script>

</body>
</html>
